# Production Configuration
# Include base configuration
include "application.conf"

# Override production-specific settings
play.http.secret.key = ${?APPLICATION_SECRET}

# Allowed hosts (configure your custom domain here)
# Add your custom domain to this list or use environment variable
play.filters.hosts {
  allowed = [".onrender.com", "localhost"]
  # Add your custom domains like: ".yourcompany.com", "www.yourapp.com"
}

# Database Configuration for Production (PostgreSQL on Render)
#
# Render expone el connection string como `postgres://user:pass@host:port/db`
# que NO es un JDBC URL válido. Para evitar el cuelgue al inicializar Slick
# (que dejaba al servidor HTTP sin bindear y disparaba el "no open ports
# detected" en Render), construimos el JDBC URL desde las variables
# individuales DB_HOST / DB_PORT / DB_NAME / DB_USER / DB_PASSWORD que se
# definen en render.yaml vía `fromDatabase`.
slick.dbs.default {
  profile = "slick.jdbc.PostgresProfile$"
  db {
    driver = "org.postgresql.Driver"
    url  = "jdbc:postgresql://"${?DB_HOST}":"${?DB_PORT}"/"${?DB_NAME}"?sslmode=require"
    user = ${?DB_USER}
    password = ${?DB_PASSWORD}
    numThreads = 10
    maxConnections = 10
    minConnections = 2
  }
}

# Production logging
play.http.errorHandler = "play.api.http.JsonHttpErrorHandler"

# Security headers
play.filters.enabled += play.filters.https.RedirectHttpsFilter

# HTTPS redirect filter configuration
# Note: Render and most platforms handle HTTPS at load balancer level
# Keep this disabled to avoid double-redirect issues
# Enable only if your platform requires app-level HTTPS redirect
play.filters.https.redirectEnabled = false
play.filters.https.strictTransportSecurity = "max-age=31536000; includeSubDomains"
