#     password = "password"
#   }
# }


play.filters.hosts {
  allowed = [
    "reactive-manifiesto.onrender.com",
    "localhost",
    "127.0.0.1"
  ]
}

# Assets Cache Control
# Fingerprinted assets (via sbt-digest) get long cache; non-fingerprinted get short cache
play.assets.cache."/public/stylesheets/"="max-age=3600, public"
play.assets.cache."/public/javascripts/"="max-age=3600, public"

# Email Configuration
# ~~~~~
# Modo desarrollo: solo imprime códigos en logs (NO envía emails reales)
email.enabled = false

# Modo producción: envía emails reales
# email.enabled = true
email.smtp.host = "smtp.gmail.com"
email.smtp.port = 587
email.smtp.user = ${?EMAIL_USER}
email.smtp.password = ${?EMAIL_PASSWORD}
email.from = ${?EMAIL_USER}
email.fromName = "Reactive Manifesto"

# Requerir verificación de email para permitir login (true por defecto)
auth.requireEmailVerification = false

# Para usar Gmail:
# 1. Habilita la verificación en 2 pasos en tu cuenta de Google
# 2. Genera una "Contraseña de aplicación" en https://myaccount.google.com/apppasswords
# 3. Define las variables de entorno EMAIL_USER y EMAIL_PASSWORD
# 4. Cambia email.enabled a true