# Application Configuration
# ~~~~~

# Application secret key for Play Framework

play.http.secret.key = ${?APPLICATION_SECRET}

# The application languages
play.i18n.langs = [ "en", "es" ]

# Filters
play.filters.enabled += play.filters.cors.CORSFilter
play.evolutions.db.default.autoApply = true
# CORS Configuration
play.filters.cors {
  pathPrefixes = ["/"]
  allowedOrigins = null
  allowedHttpMethods = ["GET", "POST"]
  allowedHttpHeaders = null
}

# Akka Configuration for Reactive Manifesto
akka {
  actor {
    default-dispatcher {
      fork-join-executor {
        parallelism-min = 8
        parallelism-factor = 2.0
        parallelism-max = 64
      }
    }
  }
}

# ────────────────────────────────────────────────────────────────────
# Issue #14 — Configuración exclusiva del ActorSystem `eventbus-core`
#
# Se aplica SOLO al EventBus (ver Module.scala) para no afectar a los
# otros 8 ActorSystems del proyecto, que siguen usando provider=local.
#
# El bloque se carga así desde Guice:
#   ConfigFactory.load().getConfig("eventbus-cluster")
#                       .withFallback(ConfigFactory.load())
# ────────────────────────────────────────────────────────────────────
eventbus-cluster {
  akka {
    actor {
      provider = "cluster"

      # Serialización para mensajes que crucen la red entre nodos.
      # En modo 1-nodo no se ejercita, pero queda lista para multi-nodo.
      serialization-bindings {
        "core.DomainEvent" = jackson-json
      }
    }

    remote.artery {
      canonical.hostname = "127.0.0.1"
      canonical.hostname = ${?EVENTBUS_HOST}
      canonical.port     = 2551
      canonical.port     = ${?EVENTBUS_PORT}
    }

    cluster {
      # Para desarrollo de 1 solo nodo, el seed se apunta a sí mismo.
      seed-nodes = ["akka://reactive-manifesto@127.0.0.1:2551"]

      # Split-Brain Resolver — evita particiones al escalar a 2+ nodos.
      downing-provider-class = "akka.cluster.sbr.SplitBrainResolverProvider"
      split-brain-resolver.active-strategy = keep-majority
    }

    extensions += "akka.cluster.pubsub.DistributedPubSub"
  }
}
# Database Configuration
# Play JDBC Database (para los repositorios que usan JDBC directo)
#db.default.driver = "org.h2.Driver"
