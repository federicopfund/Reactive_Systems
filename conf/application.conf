#db.default.logSql = true

# Connection Pool
#db.default.hikaricp.minimumIdle = 5
#db.default.hikaricp.maximumPoolSize = 10

# Slick Database - PostgreSQL
slick.dbs.default {
  profile = "slick.jdbc.PostgresProfile$"
  db {
    driver = "org.postgresql.Driver"
    url = "jdbc:postgresql://localhost:5432/reactive_manifesto"
    url = ${?DATABASE_URL}
    user = "reactive_user"
    user = ${?DATABASE_USER}
    password = "reactive_password"
    password = ${?DATABASE_PASSWORD}
    
    # Connection Pool settings
    numThreads = 10
    maxConnections = 10
    minConnections = 1
  }
}

# Evolutions
play.evolutions {
  enabled = true
  autoApply = true
  autoApplyDowns = false
}

# Desactivar DBModule (JDBC) ya que usamos solo Slick
play.modules.disabled += "play.api.db.DBModule"

# Para producción, cambiar a PostgreSQL:
# slick.dbs.default {
