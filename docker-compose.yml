version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: reactive_manifesto_db
    environment:
      POSTGRES_DB: ${DB_NAME:-reactive_manifesto}
      POSTGRES_USER: ${DB_USER:-reactive_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-reactive_password}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-reactive_user} -d ${DB_NAME:-reactive_manifesto}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
